<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DGIST STUDIO</title>
    <link rel="icon" type="image/png" href="studio-icon.png?v=2" />
    <link rel="stylesheet" href="styles.css?v=category-colors" />
  </head>
  <body class="lobby-active">
    <section class="lobby-screen" id="lobbyScreen" aria-label="DGIST STUDIO 로비">
      <div class="lobby-hero">
        <div class="lobby-copy">
          <span class="lobby-kicker">DGIST Planning Hub</span>
          <h1>DGIST <span>STUDIO</span></h1>
          <p>시간표, 수강 계획, 졸업 준비를 한곳에서 차분하게 정리하세요.</p>
        </div>

        <div class="lobby-preview" aria-hidden="true">
          <div class="preview-window">
            <div class="preview-top">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="preview-board">
              <div class="preview-hours">9<br />10<br />11<br />12<br />13<br />14</div>
              <div class="preview-grid">
                <b>월</b>
                <b>화</b>
                <b>수</b>
                <b>목</b>
                <b>금</b>
                <i class="preview-block blue"></i>
                <i class="preview-block green"></i>
                <i class="preview-block coral"></i>
                <i class="preview-block violet"></i>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="lobby-cards">
        <button class="lobby-card primary" id="enterWorkbenchBtn" type="button">
          <span class="lobby-card-icon workbench-grid" aria-hidden="true"></span>
          <strong>시간표 작업대</strong>
          <span>이번 학기 시간표를 직접 배치하고 정리하세요.</span>
          <em>작업 시작하기 →</em>
        </button>

        <button class="lobby-card muted" type="button" aria-disabled="true">
          <span class="lobby-card-icon mint wizard-icon" aria-hidden="true"></span>
          <strong>시간표 마법사</strong>
          <span>선택한 과목 조합으로 가능한 시간표를 자동으로 찾아보세요.</span>
          <em>준비 중 →</em>
        </button>

        <button class="lobby-card muted" type="button" aria-disabled="true">
          <span class="lobby-card-icon purple graduation-icon" aria-hidden="true"></span>
          <strong>졸업 작업대</strong>
          <span>졸업까지 남은 조건을 차분히 점검하세요.</span>
          <em>준비 중 →</em>
        </button>
      </div>

      <footer class="lobby-footer">© 2026 DGIST STUDIO. All rights reserved.</footer>
    </section>

    <header class="topbar">
      <div class="brand">
        <button class="icon-button" id="lobbyBackBtn" type="button" aria-label="로비로 돌아가기"></button>
        <h1>시간표 <span>작업대</span></h1>
        <div class="active-timetable-badge" id="activeTimetableBadge" title="현재 작업 중인 시간표">새 시간표</div>
      </div>
      <div class="toolbar">
        <button class="shelf-button" id="shelfBtn" type="button">시간표 보관함</button>
        <div class="credit-pill" id="creditCount">0/21</div>
      </div>
    </header>

    <main class="app-shell">
      <section class="timetable-panel" aria-label="월화수목금 시간표">
        <div class="calendar" id="calendar">
          <div class="corner-cell"></div>
        </div>
        <button class="reset-button" id="clearBtn" type="button" title="시간표 비우기" aria-label="시간표 비우기">비우기</button>
      </section>

      <aside class="subject-panel" aria-label="과목 목록">
        <div class="search-wrap">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="검색" />
        </div>

        <div class="data-info" id="dataInfo">과목 0개</div>

        <div class="filter-row" id="filterRow" aria-label="분류 필터"></div>

        <div class="subject-list" id="subjectList"></div>

        <div class="empty-state compact" id="courseEmptyState">
          <div aria-hidden="true">▦</div>
          <p>과목 없음</p>
        </div>

        <div class="panel-resizer" id="panelResizer" role="separator" aria-label="과목 목록과 배치 대기중 크기 조정" aria-orientation="horizontal">
          <span></span>
        </div>

        <div class="pending-box">
          <div>
            <span aria-hidden="true">⌘</span>
            배치 대기중
          </div>
          <strong id="pendingCount">0</strong>
        </div>

        <div class="pending-list" id="pendingList"></div>

        <div class="empty-state" id="pendingEmptyState">
          <div aria-hidden="true">▦</div>
          <p>비어있음</p>
        </div>
      </aside>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <div class="modal-backdrop" id="shelfModal" aria-hidden="true">
      <section class="shelf-modal" role="dialog" aria-modal="true" aria-labelledby="shelfTitle">
        <header class="shelf-header">
          <div>
            <h2 id="shelfTitle">시간표 보관함</h2>
            <p id="activeShelfLabel">현재 작업 중인 시간표 없음</p>
          </div>
          <button class="modal-close" id="closeShelfBtn" type="button" aria-label="시간표 보관함 닫기">×</button>
        </header>

        <div class="shelf-save-row">
          <input id="shelfNameInput" type="text" maxlength="28" placeholder="시간표 이름" />
          <button class="primary-button" id="saveShelfBtn" type="button">시간표 저장</button>
          <button class="secondary-button" id="newTimetableBtn" type="button">새 시간표</button>
        </div>

        <div class="shelf-list" id="shelfList"></div>

        <div class="empty-state shelf-empty" id="shelfEmptyState">
          <div aria-hidden="true">▦</div>
          <p>저장된 시간표 없음</p>
        </div>
      </section>
    </div>

    <template id="subjectTemplate">
      <article class="subject-card">
        <div class="subject-main">
          <div class="subject-title"></div>
          <div class="subject-tags"></div>
          <div class="subject-meta"></div>
          <div class="subject-time"></div>
        </div>
        <button class="add-button" type="button" aria-label="선택">＋</button>
      </article>
    </template>

    <script src="script.js?v=category-colors"></script>
  </body>
</html>
